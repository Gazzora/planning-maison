<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Planning Maison</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f1a;--surf:#1a1a2e;--surf2:#22223a;--surf3:#2a2a45;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --txt:#f0eff8;--txt2:rgba(240,239,248,0.55);--txt3:rgba(240,239,248,0.28);
  --acc:#7c6af7;--acc2:#a899fa;--teal:#3ecfb2;--amb:#f5a623;
  --coral:#f07070;--pink:#e87db8;--grn:#6bcb77;
  --r:14px;--rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;max-width:480px;margin:0 auto;padding-bottom:96px}
.app-header{padding:50px 20px 14px;position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:flex-end;justify-content:space-between}
.app-title{font-family:'DM Serif Display',serif;font-size:24px;letter-spacing:-0.5px}
.app-sub{font-size:12px;color:var(--txt2);text-align:right;line-height:1.5}
.view{display:none}.view.active{display:block}
/* Day strip */
.day-strip{display:flex;gap:6px;padding:14px 20px 0;overflow-x:auto;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 11px;border-radius:40px;border:1px solid var(--bdr2);background:var(--surf);cursor:pointer;transition:all .18s;min-width:50px}
.day-pill.active{background:var(--acc);border-color:var(--acc)}
.dp-letter{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.day-pill.active .dp-letter{color:rgba(255,255,255,.8)}
.dp-num{font-size:15px;font-weight:500;color:var(--txt)}
.day-pill.active .dp-num{color:#fff}
.dp-dot{width:4px;height:4px;border-radius:50%;background:var(--acc2);opacity:0}
.day-pill.has-t .dp-dot{opacity:1}
.day-pill.active .dp-dot{background:rgba(255,255,255,.7)}
/* Progress */
.prog-wrap{padding:14px 20px 8px}
.prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--txt2);margin-bottom:5px}
.prog-track{height:4px;background:var(--surf2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--teal));border-radius:4px;transition:width .4s}
/* Section */
.section{padding:8px 20px 0}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px;cursor:pointer}
.sec-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2)}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chev{font-size:14px;color:var(--txt3);transition:transform .18s;margin-left:8px}
.section.collapsed .chev{transform:rotate(-90deg)}
.section.collapsed .task-list{display:none}
/* Task card */
.task-list{display:flex;flex-direction:column;gap:5px;padding-bottom:4px}
.task-card{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:all .16s;user-select:none}
.task-card:active{transform:scale(.98)}
.task-card.done{opacity:.38}
.task-card.done .tname{text-decoration:line-through;color:var(--txt3)}
.tcheck{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.task-card.done .tcheck{background:var(--acc);border-color:var(--acc)}
.tcheck-svg{width:10px;height:10px;opacity:0;transition:opacity .15s}
.task-card.done .tcheck-svg{opacity:1}
.tname{flex:1;font-size:13px;line-height:1.35;color:var(--txt)}
.tright{display:flex;align-items:center;gap:6px;flex-shrink:0}
/* Load dots */
.load-dots{display:flex;gap:2px;align-items:center}
.ld{width:6px;height:6px;border-radius:50%;background:var(--bdr2)}
.ld.on.l1,.ld.on.l2{background:var(--grn)}
.ld.on.l3{background:var(--amb)}
.ld.on.l4,.ld.on.l5{background:var(--coral)}
/* Avatar */
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.av-w{background:var(--w-bg);color:var(--w)}
.av-pw{background:var(--w-l);color:var(--w);border:1px dashed var(--w-bd)}
.av-b{background:rgba(62,207,178,.15);color:var(--teal);font-size:8px}
.av-pj{background:var(--j-l);color:var(--j);border:1px dashed var(--j-bd)}
.av-j{background:var(--j-bg);color:var(--j)}
/* Freq tag */
.ftag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.fq,.f2w{background:rgba(62,207,178,.12);color:var(--teal)}
.fh,.f2h,.f3h{background:rgba(124,106,247,.15);color:var(--acc2)}
.fm,.f2m,.f3m{background:rgba(245,166,35,.12);color:var(--amb)}
.fs,.fa{background:rgba(240,112,112,.12);color:var(--coral)}
/* Edit form */
.edit-wrap{display:none}.edit-wrap.open{display:block}
.edit-form{background:var(--surf2);border:1px solid var(--bdr2);border-radius:var(--r);padding:15px;margin-top:5px}
.fl{font-size:11px;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;display:block}
.fi{background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--rs);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 11px;outline:none;width:100%;appearance:none;-webkit-appearance:none}
.fi:focus{border-color:var(--acc)}
.fi option{background:#1a1a2e}
/* WHO 5-options */
.who-5{display:flex;gap:4px;flex-wrap:nowrap}
.w5{flex:1;padding:7px 2px;border-radius:var(--rs);border:1px solid var(--bdr2);background:var(--surf);color:var(--txt3);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.w5.sw{background:var(--w-bg);border-color:var(--w);color:var(--w)}
.w5.spw{background:var(--w-l);border-color:var(--w-bd);color:var(--w)}
.w5.sb{background:rgba(62,207,178,.15);border-color:var(--teal);color:var(--teal)}
.w5.spj{background:var(--j-l);border-color:var(--j-bd);color:var(--j)}
.w5.sj{background:var(--j-bg);border-color:var(--j);color:var(--j)}
.load-slider{width:100%;accent-color:var(--acc);cursor:pointer}
.form-row{display:flex;gap:8px}
.form-row>div{flex:1;min-width:0}
.mg-b{margin-bottom:10px}
.form-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-save{flex:1;background:var(--acc);border:none;border-radius:var(--rs);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px;cursor:pointer}
.btn-cancel-f{border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 13px;cursor:pointer;background:var(--surf);border:1px solid var(--bdr2);color:var(--txt2)}
.btn-del-f{border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 13px;cursor:pointer;background:rgba(240,112,112,.1);border:1px solid rgba(240,112,112,.25);color:var(--coral)}
.add-btn{display:flex;align-items:center;gap:8px;width:100%;padding:11px 13px;background:none;border:1px dashed var(--bdr2);border-radius:var(--r);color:var(--txt2);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .16s;margin-top:6px}
.add-btn:hover{border-color:var(--acc);color:var(--acc2)}
/* Color swatches */
.swatches{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.swatch.selected{border-color:#fff;transform:scale(1.15)}
/* Planning */
.plan-header{padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.btn-auto{background:var(--acc);border:none;border-radius:var(--rs);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:9px 16px;cursor:pointer}
.plan-day{margin:0 20px 12px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.plan-day-head{padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bdr);font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;justify-content:space-between}
.plan-task{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--bdr)}
.plan-task:last-child{border-bottom:none}
.plan-task-name{flex:1;font-size:13px;color:var(--txt);min-width:0}
.person-toggle{display:flex;border-radius:20px;overflow:hidden;border:1px solid var(--bdr2);flex-shrink:0}
.pt-btn{padding:4px 9px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:var(--surf);color:var(--txt3);font-family:'DM Sans',sans-serif;transition:all .15s}
.pt-btn.am{background:var(--w-bg);color:var(--w)}
.pt-btn.aj{background:var(--j-bg);color:var(--j)}
.btn-x{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;padding:0 2px;line-height:1;transition:color .15s;flex-shrink:0}
.btn-x:hover{color:var(--coral)}
/* Plan add form */
.plan-add-form{padding:10px 14px;border-top:1px solid var(--bdr);background:var(--surf3)}
.plan-add-form .fi{margin-bottom:8px;font-size:12px;padding:8px 10px}
.plan-add-who{display:flex;gap:4px;margin-bottom:8px}
.paw{flex:1;padding:6px 0;border-radius:var(--rs);border:1px solid var(--bdr2);background:var(--surf);color:var(--txt3);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;text-align:center}
.paw.sw{background:var(--w-bg);border-color:var(--w);color:var(--w)}
.paw.sj{background:var(--j-bg);border-color:var(--j);color:var(--j)}
.paw.sb{background:rgba(62,207,178,.15);border-color:var(--teal);color:var(--teal)}
.plan-add-btns{display:flex;gap:6px}
/* Stats */
.stats-wrap{padding:16px 20px 0}
.period-tabs{display:flex;gap:6px;margin-bottom:16px}
.ptab{flex:1;padding:8px 0;border-radius:var(--rs);border:1px solid var(--bdr2);background:var(--surf);color:var(--txt2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
.ptab.active{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:500}
.pcard{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;margin-bottom:10px}
.bar-track{height:5px;background:var(--surf2);border-radius:4px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(15,15,26,.96);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;padding:10px 0 env(safe-area-inset-bottom,16px);z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:none;color:var(--txt3);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;transition:color .15s}
.ni.active{color:var(--acc2)}
.ni-icon{font-size:20px;line-height:1}
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);font-size:13px;padding:9px 18px;border-radius:40px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:48px 20px;color:var(--txt2);font-size:14px;line-height:1.6}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAlGin2f32soy5dJdJ5TPLCg8V2qwJkufA",
    authDomain: "planning-maison-2c244.firebaseapp.com",
    projectId: "planning-maison-2c244",
    storageBucket: "planning-maison-2c244.firebasestorage.app",
    messagingSenderId: "986154499696",
    appId: "1:986154499696:web:98432f4545f9ac07dcbeb5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const DOC = doc(db, 'planning', 'shared');

  // Expose sync functions to global scope
  window._db = db;
  window._DOC = DOC;
  window._setDoc = setDoc;
  window._onSnapshot = onSnapshot;
  window._getDoc = getDoc;
  window._firebaseReady = true;

  // Listen for remote changes
  onSnapshot(DOC, (snap) => {
    if (!snap.exists()) return;
    const data = snap.data();
    // Only update if change came from another device
    if (data._updatedBy !== window._deviceId) {
      if (data.tasks) window._remoteUpdate('tasks', data.tasks);
      if (data.weekPlans) window._remoteUpdate('weekPlans', data.weekPlans);
      if (data.completions) window._remoteUpdate('completions', data.completions);
      if (data.cats) window._remoteUpdate('cats', data.cats);
      if (data.manualLastDone) window._remoteUpdate('manualLastDone', data.manualLastDone);
    }
  });
</script>

// ── CONSTANTS ──────────────────────────────────────────────────────────────

// ── STATE ──────────────────────────────────────────────────────────────────
let tasks,cats,weekPlans,completions,nextId,nextCatId;
let curView='agenda',curDay=DAYS[((new Date().getDay()+6)%7)];
let editId=null,addCat=null,addCatOpen=false,selCatColor=CAT_COLORS[5];
let statPeriod='semaine',planAddDay=null,planAddWho='william',showAllTasks=false;
let manualLastDone={};
let settings={williamName:'William',julietteName:'Juliette',williamColor:'#7c6af7',julietteColor:'#e87db8'};
let planWeekOffset=0;

// ── STORAGE ────────────────────────────────────────────────────────────────
function load(){
  tasks=JSON.parse(localStorage.getItem('pm4_t')||'null')||JSON.parse(JSON.stringify(DEFAULT_TASKS));
  cats=JSON.parse(localStorage.getItem('pm4_cats')||'null')||JSON.parse(JSON.stringify(DEFAULT_CATS));
  weekPlans=JSON.parse(localStorage.getItem('pm4_p')||'{}');
  completions=JSON.parse(localStorage.getItem('pm4_c')||'[]');
  nextId=+localStorage.getItem('pm4_n')||100;
  nextCatId=+localStorage.getItem('pm4_nc')||10;
  manualLastDone=JSON.parse(localStorage.getItem('pm4_mld')||'{}');
  const savedSettings=JSON.parse(localStorage.getItem('pm4_settings')||'null');
  if(savedSettings) settings={...settings,...savedSettings};
  applyColors();
  // Migrate old 'moi' → 'william'
  tasks.forEach(t=>{if(t.who==='moi')t.who='william'});
  // Device ID for sync conflict detection
  if(!localStorage.getItem('pm4_did')){
    localStorage.setItem('pm4_did', Math.random().toString(36).slice(2));
  }
  window._deviceId = localStorage.getItem('pm4_did');
}
function save(){
  localStorage.setItem('pm4_t',JSON.stringify(tasks));
  localStorage.setItem('pm4_cats',JSON.stringify(cats));
  localStorage.setItem('pm4_p',JSON.stringify(weekPlans));
  localStorage.setItem('pm4_c',JSON.stringify(completions));
  localStorage.setItem('pm4_n',nextId);
  localStorage.setItem('pm4_nc',nextCatId);
  localStorage.setItem('pm4_mld',JSON.stringify(manualLastDone));
  localStorage.setItem('pm4_settings',JSON.stringify(settings));
  syncToFirebase();
}

function syncToFirebase(){
  if(!window._firebaseReady) return;
  window._setDoc(window._DOC, {
    tasks,cats,weekPlans,completions,manualLastDone,settings,
    _updatedBy: window._deviceId,
    _updatedAt: Date.now()
  }).catch(e=>console.warn('Sync error:',e));
}

window._remoteUpdate = function(key, value){
  if(key==='tasks'){ tasks=value; }
  else if(key==='weekPlans'){ weekPlans=value; }
  else if(key==='completions'){ completions=value; }
  else if(key==='cats'){ cats=value; }
  else if(key==='manualLastDone'){ manualLastDone=value; }
  else if(key==='settings'){ settings={...settings,...value}; applyColors(); }
  // Update localStorage too
  const lsKey={'tasks':'pm4_t','weekPlans':'pm4_p','completions':'pm4_c','cats':'pm4_cats','manualLastDone':'pm4_mld'}[key];
  if(lsKey) localStorage.setItem(lsKey, JSON.stringify(value));
  render();
  showSyncToast();
};

function showSyncToast(){
  const t=document.getElementById('toast');
  t.textContent='🔄 Synchronisé avec l\'autre appareil';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function hexToRgba(hex,a){
  const h=hex.replace('#','');
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function applyColors(){
  const r=document.documentElement.style;
  r.setProperty('--w',settings.williamColor);
  r.setProperty('--w-bg',hexToRgba(settings.williamColor,0.2));
  r.setProperty('--w-bd',hexToRgba(settings.williamColor,0.4));
  r.setProperty('--w-l',hexToRgba(settings.williamColor,0.1));
  r.setProperty('--j',settings.julietteColor);
  r.setProperty('--j-bg',hexToRgba(settings.julietteColor,0.2));
  r.setProperty('--j-bd',hexToRgba(settings.julietteColor,0.4));
  r.setProperty('--j-l',hexToRgba(settings.julietteColor,0.1));
}
function weekKeyOffset(offset=0){
  const d=new Date();d.setDate(d.getDate()+offset*7);return weekKey(d);
}
function weekRange(offset=0){
  const d=new Date();d.setDate(d.getDate()+offset*7);
  const dow=(d.getDay()+6)%7;
  const start=new Date(d);start.setDate(d.getDate()-dow);start.setHours(0,0,0,0);
  const end=new Date(start);end.setDate(start.getDate()+7);
  return {start,end};
}
function isDueInWeek(task,offset=0){
  const{start,end}=weekRange(offset);
  const last=getLastDone(task.id);
  if(!last) return true;
  const next=new Date(last);
  next.setDate(next.getDate()+(FREQ_DAYS[task.freq]||1));
  return next<end;
}
function weekKey(d=new Date()){
  const jan=new Date(d.getFullYear(),0,1);
  return d.getFullYear()+'-W'+String(Math.ceil(((d-jan)/864e5+jan.getDay()+1)/7)).padStart(2,'0');
}
function tasksForDay(day){return tasks.filter(t=>(DAY_SETS[t.days]||DAY_SETS.tous).includes(day))}
function isDone(id,day=curDay){const td=getTargetDate(day).toISOString().slice(0,10);return completions.some(c=>c.taskId===id&&c.date===td)}
function getWkData(){return weekPlans[weekKey()]||{plan:{},extras:{}}}
function getPlan(){return getWkData().plan}
function getExtras(){return getWkData().extras}
function assigned(id){
  const wkd=getWkData();
  if(wkd.validated){
    const p=wkd.plan?.[id];
    if(p&&p!=='skip') return p;
  }
  const t=tasks.find(x=>x.id===id);
  if(!t) return 'william';
  if(t.who==='william'||t.who==='pref-w') return 'william';
  if(t.who==='juliette'||t.who==='pref-j') return 'juliette';
  return 'both';
}

function getLastDone(taskId){
  const comps=completions.filter(c=>c.taskId===taskId).map(c=>c.date).sort();
  const lastComp=comps[comps.length-1]||null;
  const manual=manualLastDone[taskId]||null;
  if(lastComp&&manual) return lastComp>manual?lastComp:manual;
  return lastComp||manual||null;
}
function isDue(task,refDate=new Date()){
  const days=FREQ_DAYS[task.freq]||1;
  const last=getLastDone(task.id);
  if(!last) return true;
  return Math.floor((refDate-new Date(last))/864e5)>=days;
}
function getTargetDate(day){
  const todayIdx=(new Date().getDay()+6)%7;
  const selIdx=DAYS.indexOf(day);
  const diff=selIdx-todayIdx;
  const d=new Date();
  d.setDate(d.getDate()+diff);
  d.setHours(23,59,59);
  return d;
}
function nextDueStr(task){
  const last=getLastDone(task.id);if(!last)return null;
  const d=new Date(last);
  d.setDate(d.getDate()+(FREQ_DAYS[task.freq]||1));
  const diff=Math.ceil((d-new Date())/864e5);
  if(diff<=0) return 'Aujourd\'hui';
  if(diff===1) return 'Demain';
  if(diff<7) return 'Dans '+diff+' j.';
  if(diff<32) return 'Dans '+Math.round(diff/7)+' sem.';
  if(diff<365) return 'Dans '+Math.round(diff/30)+' mois';
  return 'Dans '+Math.round(diff/365)+' an(s)';
}
function dots(n){
  let h='<div class="load-dots">';
  for(let i=1;i<=5;i++) h+=`<div class="ld${i<=n?' on l'+i:''}"></div>`;
  return h+'</div>';
}
function whoInfo(v){return WHO_OPTS.find(o=>o.v===v)||WHO_OPTS[2]}
function avFor(who){
  const w=whoInfo(who);
  return `<div class="avatar ${w.cls}" style="${who==='both'?'font-size:8px':''}">${w.short}</div>`;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function go(v,el){
  curView=v;editId=null;addCat=null;addCatOpen=false;planAddDay=null;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');render();
}
function render(){
  const d=new Date();
  document.getElementById('hdate').innerHTML=
    d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})+
    '<br><span style="font-size:11px">'+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+'</span>';
  if(curView==='agenda') renderAgenda();
  else if(curView==='tasks') renderTasks();
  else if(curView==='planning') renderPlanning();
  else if(curView==='stats') renderStats();
  else if(curView==='settings') renderSettings();
}

// ── AGENDA ─────────────────────────────────────────────────────────────────

function renderTeamProgress(){
  const{start,end}=weekRange(0);
  const startStr=start.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  const endD=new Date(end);endD.setDate(endD.getDate()-1);
  const endStr=endD.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  // Compute weekly totals (galère points)
  let totalPts=0,donePts=0,totalCount=0,doneCount=0;
  DAYS.forEach(day=>{
    const tDate=getTargetDate(day);
    const dt=tasksForDay(day).filter(t=>isDue(t,tDate));
    dt.forEach(t=>{
      totalCount++;totalPts+=t.load;
      if(isDone(t.id,day)){doneCount++;donePts+=t.load;}
    });
  });
  const pctPts=totalPts?Math.round(donePts/totalPts*100):0;
  // Daily sparkline
  const todayIdx=(new Date().getDay()+6)%7;
  let sparkline='';
  DAYS.forEach((day,i)=>{
    const tDate=getTargetDate(day);
    const dt=tasksForDay(day).filter(t=>isDue(t,tDate));
    const dayTotalPts=dt.reduce((s,t)=>s+t.load,0);
    const dayDonePts=dt.filter(t=>isDone(t.id,day)).reduce((s,t)=>s+t.load,0);
    const pct=dayTotalPts?dayDonePts/dayTotalPts:0;
    const isToday=i===todayIdx;
    const h=dayTotalPts?Math.max(dayTotalPts/Math.max(...DAYS.map(d=>{
      const td=getTargetDate(d);
      return tasksForDay(d).filter(t=>isDue(t,td)).reduce((s,t)=>s+t.load,0);
    }),1)*36,4):0;
    sparkline+=`<div onclick="switchDay('${day}')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">
      <div style="height:40px;display:flex;align-items:flex-end;width:100%;justify-content:center">
        <div style="position:relative;width:60%;height:${h}px;background:var(--surf2);border-radius:3px;overflow:hidden">
          <div style="position:absolute;bottom:0;left:0;right:0;height:${pct*100}%;background:var(--teal);border-radius:3px"></div>
        </div>
      </div>
      <div style="font-size:9px;color:${isToday?'var(--acc2)':'var(--txt3)'};font-weight:${isToday?'500':'400'}">${day.slice(0,2)}</div>
    </div>`;
  });
  return `<div style="margin:14px 16px 0;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:16px">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em">Cette semaine ensemble</div>
        <div style="font-size:12px;color:var(--txt3);margin-top:2px">Du ${startStr} au ${endStr}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'DM Serif Display',serif;font-size:32px;line-height:1;color:var(--teal)">${pctPts}%</div>
      </div>
    </div>
    <div style="height:8px;background:var(--surf2);border-radius:6px;overflow:hidden;margin-bottom:10px">
      <div style="height:100%;background:linear-gradient(90deg,var(--acc),var(--teal));border-radius:6px;width:${pctPts}%;transition:width .5s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--txt2);margin-bottom:12px">
      <span><b style="color:var(--txt)">${doneCount}</b> / ${totalCount} tâches</span>
      <span><b style="color:var(--txt)">${donePts}</b> / ${totalPts} pts de galère</span>
    </div>
    <div style="display:flex;gap:4px;padding-top:10px;border-top:1px solid var(--bdr)">
      ${sparkline}
    </div>
  </div>`;
}

function renderAgenda(){
  const todayIdx=(new Date().getDay()+6)%7;
  let strip='<div class="day-strip">';
  DAYS.forEach((d,i)=>{
    const hasT=tasksForDay(d).filter(t=>isDue(t,getTargetDate(d))).length>0,isToday=i===todayIdx;
    strip+=`<div class="day-pill${d===curDay?' active':''}${hasT?' has-t':''}" onclick="switchDay('${d}')">
      <span class="dp-letter">${d.slice(0,2)}</span>
      <span class="dp-num" style="${isToday?'color:var(--acc2)':''}">${isToday?'•':i+1}</span>
      <span class="dp-dot"></span></div>`;
  });strip+='</div>';
  const weekChart=renderTeamProgress();
  const targetDate=getTargetDate(curDay);
  const allDayT=tasksForDay(curDay);
  const dueTasks=showAllTasks?allDayT:allDayT.filter(t=>isDue(t,targetDate));
  const notDueTasks=showAllTasks?[]:allDayT.filter(t=>!isDue(t,targetDate));
  const dc=dueTasks.filter(t=>isDone(t.id)).length;
  const pct=dueTasks.length?Math.round(dc/dueTasks.length*100):0;
  const prog=`<div class="prog-wrap">
    <div class="prog-top">
      <span>${DAYS_FULL[DAYS.indexOf(curDay)]}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="showAllTasks=!showAllTasks;render()" style="background:none;border:1px solid var(--bdr2);border-radius:20px;color:var(--txt2);font-size:10px;padding:2px 8px;cursor:pointer;font-family:'DM Sans',sans-serif">${showAllTasks?'Voir à faire':'Tout voir'}</button>
        <span style="font-size:12px;color:var(--txt2)">${dc}/${dueTasks.length} — ${pct}%</span>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;
  let secs='';
  if(!dueTasks.length&&!notDueTasks.length){secs='<div class="empty"><div class="empty-icon">✨</div>Aucune tâche ce jour</div>';}
  else if(!dueTasks.length&&!showAllTasks){secs='<div class="empty"><div class="empty-icon">🎉</div>Toutes les tâches sont à jour !<br><span style="font-size:13px">Cliquez "Tout voir" pour afficher les prochaines échéances.</span></div>';}
  cats.forEach(cat=>{
    const ct=dueTasks.filter(t=>t.cat===cat.id);if(!ct.length)return;
    const cd=ct.filter(t=>isDone(t.id)).length;
    secs+=`<div class="section" id="as_${cat.id}">
      <div class="section-head" onclick="toggleSec('as_${cat.id}')">
        <div class="sec-label"><span class="sec-dot" style="background:${cat.color}"></span>${cat.label}</div>
        <div style="display:flex;align-items:center"><span style="font-size:11px;color:var(--txt3)">${cd}/${ct.length}</span><span class="chev">›</span></div>
      </div><div class="task-list">`;
    ct.forEach(t=>{
      const done=isDone(t.id),who=assigned(t.id);
      secs+=`<div class="task-card${done?' done':''}" onclick="toggleDone(${t.id})">
        <div class="tcheck"><svg class="tcheck-svg" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="tname">${t.name}</span>
        <div class="tright">${dots(t.load)}${avFor(who)}</div></div>`;
    });secs+='</div></div>';
  });
  // Not yet due section
  if(notDueTasks.length){
    secs+=`<div class="section" id="as_notdue">
      <div class="section-head" onclick="toggleSec('as_notdue')">
        <div class="sec-label"><span class="sec-dot" style="background:var(--txt3)"></span>Pas encore dues</div>
        <div style="display:flex;align-items:center"><span style="font-size:11px;color:var(--txt3)">${notDueTasks.length}</span><span class="chev">›</span></div>
      </div><div class="task-list">`;
    notDueTasks.forEach(t=>{
      const nd=nextDueStr(t);
      secs+=`<div class="task-card" style="opacity:.45;cursor:default">
        <div class="tcheck"></div>
        <span class="tname">${t.name}</span>
        <div class="tright">${nd?`<span style="font-size:10px;color:var(--teal);background:rgba(62,207,178,.1);padding:2px 7px;border-radius:20px">${nd}</span>`:''}${avFor(assigned(t.id))}</div></div>`;
    });secs+='</div></div>';
  }
  document.getElementById('view-agenda').innerHTML=strip+weekChart+prog+secs;
}
function switchDay(d){curDay=d;render()}
function toggleSec(id){document.getElementById(id)?.classList.toggle('collapsed')}
function toggleDone(taskId){
  const td=getTargetDate(curDay).toISOString().slice(0,10),wk=weekKey(),person=assigned(taskId);
  const idx=completions.findIndex(c=>c.taskId===taskId&&c.date===td);
  if(idx>=0)completions.splice(idx,1);else completions.push({taskId,person,date:td,week:wk});
  save();render();
}

// ── TASKS ──────────────────────────────────────────────────────────────────
function renderTasks(){
  let html='';
  cats.forEach(cat=>{
    const ct=tasks.filter(t=>t.cat===cat.id);
    html+=`<div class="section">
      <div class="section-head">
        <div class="sec-label"><span class="sec-dot" style="background:${cat.color}"></span>${cat.label}</div>
        <span style="font-size:11px;color:var(--txt3)">${ct.length} tâche${ct.length>1?'s':''}</span>
      </div><div class="task-list">`;
    ct.forEach(t=>{
      const isEdit=editId===t.id;
      html+=`<div><div class="task-card" onclick="toggleEdit(${t.id})">
        ${avFor(t.who)}
        <span class="tname">${t.name}</span>
        <div class="tright">${dots(t.load)}<span class="ftag ${FREQ_CSS[t.freq]||'fm'}">${FREQ_LABELS[t.freq]||t.freq}</span>
        <span style="color:var(--txt3);font-size:12px;margin-left:2px">${isEdit?'▲':'▼'}</span></div>
      </div>
      <div class="edit-wrap${isEdit?' open':''}">
        ${isEdit?buildForm(t,'edit'):''}
      </div></div>`;
    });
    html+=`<button class="add-btn" onclick="openAdd('${cat.id}')"><span style="font-size:18px;line-height:1">+</span> Ajouter dans ${cat.label}</button>`;
    if(addCat===cat.id) html+=`<div class="edit-wrap open">${buildForm(null,'add',cat.id)}</div>`;
    html+='</div></div>';
  });
  // Category management
  html+=`<div class="section" id="sec_catmgr">
    <div class="section-head" onclick="toggleSec('sec_catmgr')">
      <div class="sec-label"><span class="sec-dot" style="background:var(--txt3)"></span>Gérer les catégories</div>
      <span class="chev">›</span>
    </div><div class="task-list">`;
  cats.forEach(cat=>{
    const n=tasks.filter(t=>t.cat===cat.id).length;
    html+=`<div class="task-card" style="cursor:default">
      <div style="width:12px;height:12px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
      <span class="tname">${cat.label}</span>
      <div class="tright">
        <span style="font-size:11px;color:var(--txt3)">${n} tâche${n>1?'s':''}</span>
        ${n===0?`<button class="btn-x" onclick="deleteCat('${cat.id}')" title="Supprimer">×</button>`:''}
      </div></div>`;
  });
  if(addCatOpen){
    html+=`<div class="edit-form" onclick="event.stopPropagation()" style="margin-top:6px">
      <label class="fl">Nom de la catégorie</label>
      <input class="fi mg-b" id="nc_name" placeholder="Ex: Jardin, Voiture…">
      <label class="fl">Couleur</label>
      <div class="swatches" id="nc_swatches">
        ${CAT_COLORS.map(c=>`<div class="swatch${c===selCatColor?' selected':''}" style="background:${c}" onclick="pickCatColor('${c}')"></div>`).join('')}
      </div>
      <div class="form-actions">
        <button class="btn-save" onclick="confirmAddCat()">Créer</button>
        <button class="btn-cancel-f" onclick="closeAddCat()">Annuler</button>
      </div></div>`;
  } else {
    html+=`<button class="add-btn" onclick="openAddCat()"><span style="font-size:18px;line-height:1">+</span> Nouvelle catégorie</button>`;
  }
  html+='</div></div><div style="height:8px"></div>';
  document.getElementById('view-tasks').innerHTML=html;
}

function buildForm(t,mode,catId){
  const name=t?t.name:'',freq=t?t.freq:'h',days=t?t.days:'tous',who=t?t.who:'both',loadV=t?t.load:2;
  const fid=mode==='edit'?'ef':'af';
  const dayOpts=[['tous','Tous les jours'],['semaine','Jours de semaine'],['weekend','Week-end'],
    ['lundi','Lundi'],['mardi','Mardi'],['mercredi','Mercredi'],['jeudi','Jeudi'],
    ['vendredi','Vendredi'],['samedi','Samedi'],['dimanche','Dimanche']];
  return `<div class="edit-form" onclick="event.stopPropagation()">
    <label class="fl">Nom</label>
    <input class="fi mg-b" id="${fid}_name" value="${name}" placeholder="Nom de la tâche…">
    <div class="form-row mg-b">
      <div><label class="fl">Fréquence</label>
        <select class="fi" id="${fid}_freq">${FREQ_OPTS.map(([v,l])=>`<option value="${v}"${freq===v?' selected':''}>${l}</option>`).join('')}</select></div>
      <div><label class="fl">Jours</label>
        <select class="fi" id="${fid}_days">${dayOpts.map(([v,l])=>`<option value="${v}"${days===v?' selected':''}>${l}</option>`).join('')}</select></div>
    </div>
    <label class="fl">Personne prédestinée à faire :</label>
    <div class="who-5 mg-b" id="${fid}_who">
      ${WHO_OPTS.map(o=>`<button class="w5${who===o.v?' '+o.wcls:''}" onclick="pickWho(this,'${o.v}','${fid}')" title="${o.label}">${o.short}</button>`).join('')}
    </div>
    <label class="fl">Niveau de galère : <span id="${fid}_lv">${loadV}/5</span></label>

        ?`<button class="btn-save" onclick="saveEdit(${t.id})">Enregistrer</button>

function toggleEdit(id){editId=editId===id?null:id;addCat=null;renderTasks()}

function closeAddCat(){addCatOpen=false;renderTasks()}

// ── PLANNING ───────────────────────────────────────────────────────────────
function renderPlanning(){
  const wk=weekKeyOffset(planWeekOffset);
  const wkData=weekPlans[wk];
  const plan=wkData?.plan||null;
  const extras=wkData?.extras||{};
  const validated=wkData?.validated||false;
  const {start,end}=weekRange(planWeekOffset);
  const startStr=start.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  const endD=new Date(end);endD.setDate(endD.getDate()-1);
  const endStr=endD.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  const weekLabel=planWeekOffset===0?'Cette semaine':planWeekOffset===1?'Semaine prochaine':planWeekOffset===-1?'Semaine dernière':`Dans ${planWeekOffset} sem.`;
  let html=`<div style="padding:14px 16px 0">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button onclick="planWeekOffset--;render()" style="background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--rs);color:var(--txt);font-family:'DM Sans',sans-serif;padding:8px 12px;cursor:pointer;font-size:14px">‹</button>
      <div style="flex:1;text-align:center">
        <div style="font-size:14px;font-weight:500">${weekLabel}</div>
        <div style="font-size:11px;color:var(--txt2);margin-top:2px">${startStr} – ${endStr}${validated?' · ✓ validé':''}</div>
      </div>
      <button onclick="planWeekOffset++;render()" style="background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--rs);color:var(--txt);font-family:'DM Sans',sans-serif;padding:8px 12px;cursor:pointer;font-size:14px">›</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px">
      <button onclick="autoAssign()" style="flex:1;background:var(--acc);border:none;border-radius:var(--rs);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px;cursor:pointer">✨ Auto-répartir</button>
      ${plan?`<button onclick="validatePlan()" style="background:${validated?'rgba(62,207,178,0.15)':'var(--teal)'};border:1px solid ${validated?'rgba(62,207,178,0.4)':'var(--teal)'};border-radius:var(--rs);color:${validated?'var(--teal)':'#fff'};font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 14px;cursor:pointer">${validated?'✓ Validé':'Valider'}</button>`:''}
      ${plan?`<button onclick="clearPlan()" style="background:rgba(240,112,112,0.1);border:1px solid rgba(240,112,112,0.3);border-radius:var(--rs);color:var(--coral);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 14px;cursor:pointer">🗑 Effacer</button>`:''}
    </div>
  </div>`;

  if(!plan){
    html+=`<div style="padding:32px 20px;text-align:center;color:var(--txt2)">
      <div style="font-size:36px;margin-bottom:12px">🗓</div>
      <div style="font-weight:500;margin-bottom:8px">Planning vide</div>
      <div style="font-size:13px;line-height:1.6">Cliquez "Auto-répartir" pour générer la répartition.<br>L'auto-répartition ne prend en compte que les tâches dues cette semaine selon leur fréquence et leur dernière réalisation.</div>
    </div>`;
    document.getElementById('view-planning').innerHTML=html;return;
  }

  // Load summary based on plan + extras
  let wL=0,jL=0,wC=0,jC=0;
  tasks.forEach(t=>{
    const a=plan[t.id];if(!a||a==='skip') return;
    const w=t.load*(FREQ_W[t.freq]||.25);
    if(a==='william'){wL+=w;wC++}else if(a==='juliette'){jL+=w;jC++}
  });
  Object.values(extras).forEach(de=>(de||[]).forEach(e=>{if(e.person==='william')wC++;else if(e.person==='juliette')jC++;}));
  const tot=wL+jL||1;
  html+=`<div style="padding:0 16px 14px;display:flex;gap:10px">
    <div style="flex:1;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:13px">
      <div class="avatar av-w" style="margin-bottom:8px">${settings.williamName[0]}</div>
      <div style="font-size:20px;font-weight:500">${wC}<span style="font-size:12px;color:var(--txt2);font-weight:400"> tâches</span></div>
      <div style="font-size:11px;color:var(--txt2);margin-bottom:5px">${Math.round(wL*10)/10} pts</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(wL/tot*100)}%;background:var(--w)"></div></div>
    </div>
    <div style="flex:1;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:13px">
      <div class="avatar av-j" style="margin-bottom:8px">${settings.julietteName[0]}</div>
      <div style="font-size:20px;font-weight:500">${jC}<span style="font-size:12px;color:var(--txt2);font-weight:400"> tâches</span></div>
      <div style="font-size:11px;color:var(--txt2);margin-bottom:5px">${Math.round(jL*10)/10} pts</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(jL/tot*100)}%;background:var(--j)"></div></div>
    </div>
  </div>`;

  const todayIdx=(new Date().getDay()+6)%7;
  DAYS.forEach((day,di)=>{
    const dt=tasksForDay(day).filter(t=>plan[t.id]&&plan[t.id]!=='skip');
    const exs=extras[day]||[];
    if(!dt.length&&!exs.length&&planAddDay!==day) return;
    const isTodayCurrentWk=di===todayIdx&&planWeekOffset===0;
    html+=`<div class="plan-day">
      <div class="plan-day-head">
        <span>${isTodayCurrentWk?'📌 ':''} ${DAYS_FULL[di]}</span>
        <button class="add-btn" style="border:none;margin:0;padding:4px 8px;width:auto;background:none;font-size:12px;color:var(--acc2)" onclick="openPlanAdd('${day}')">+ Ajouter</button>
      </div>`;
    dt.forEach(t=>{
      const a=plan[t.id],canSwap=(t.who==='both'||t.who==='pref-w'||t.who==='pref-j');
      html+=`<div class="plan-task">
        <div style="flex:1;min-width:0">
          <div class="plan-task-name">${t.name}</div>
          <div style="margin-top:3px">${dots(t.load)}</div>
        </div>
        ${canSwap?`<div class="person-toggle">
            <button class="pt-btn${a==='william'?' am':''}" onclick="swapPlan(${t.id},'william')">${settings.williamName[0]}</button>
            <button class="pt-btn${a==='juliette'?' aj':''}" onclick="swapPlan(${t.id},'juliette')">${settings.julietteName[0]}</button>
          </div>`:`<div class="avatar ${a==='william'?'av-w':'av-j'}">${a==='william'?settings.williamName[0]:settings.julietteName[0]}</div>`}
        <button class="btn-x" onclick="removePlanTask(${t.id})" title="Retirer cette semaine">×</button>
      </div>`;
    });
    exs.forEach((e,i)=>{
      html+=`<div class="plan-task" style="background:var(--w-l)">
        <div style="flex:1;min-width:0">
          <div class="plan-task-name">${e.name} <span style="font-size:10px;color:var(--txt3)">ajouté</span></div>
        </div>
        <div class="avatar ${e.person==='william'?'av-w':e.person==='juliette'?'av-j':'av-b'}">${e.person==='william'?settings.williamName[0]:e.person==='juliette'?settings.julietteName[0]:settings.williamName[0]+'+'+settings.julietteName[0]}</div>
        <button class="btn-x" onclick="removePlanExtra('${day}',${i})">×</button>
      </div>`;
    });
    if(planAddDay===day){
      html+=`<div class="plan-add-form" onclick="event.stopPropagation()">
        <input class="fi" id="pa_name" placeholder="Nom de la tâche à ajouter…">
        <div class="plan-add-who" id="pa_who">
          <button class="paw sw" onclick="pickPAW(this,'william')">${settings.williamName}</button>
          <button class="paw" onclick="pickPAW(this,'juliette')">${settings.julietteName}</button>
          <button class="paw" onclick="pickPAW(this,'both')">Les deux</button>
        </div>
        <div class="plan-add-btns">
          <button class="btn-save" style="flex:1;font-size:12px;padding:8px" onclick="confirmPlanAdd('${day}')">Ajouter</button>
          <button class="btn-cancel-f" style="font-size:12px;padding:8px" onclick="closePlanAdd()">Annuler</button>
        </div></div>`;
    }
    html+='</div>';
  });
  document.getElementById('view-planning').innerHTML=html;
  if(planAddDay) setTimeout(()=>document.getElementById('pa_name')?.focus(),60);
}

function clearPlan(){
  const wk=weekKeyOffset(planWeekOffset);
  delete weekPlans[wk];
  save();toast('Planning effacé');renderPlanning();
}
function validatePlan(){
  const wk=weekKeyOffset(planWeekOffset);
  if(!weekPlans[wk]) return;
  weekPlans[wk].validated=!weekPlans[wk].validated;
  save();toast(weekPlans[wk].validated?'Planning validé ✓':'Validation retirée');
  renderPlanning();
}

function autoAssign(){
  const wk=weekKeyOffset(planWeekOffset),plan={};
  let wS=0,jS=0;
  const fw=t=>t.load*(FREQ_W[t.freq]||.25);
  const eligible=tasks.filter(t=>isDueInWeek(t,planWeekOffset));
  eligible.filter(t=>t.who==='william').forEach(t=>{plan[t.id]='william';wS+=fw(t)});
  eligible.filter(t=>t.who==='juliette').forEach(t=>{plan[t.id]='juliette';jS+=fw(t)});
  eligible.filter(t=>t.who==='pref-w').sort((a,b)=>b.load-a.load).forEach(t=>{
    if(wS<=jS*1.35){plan[t.id]='william';wS+=fw(t)}else{plan[t.id]='juliette';jS+=fw(t)}
  });
  eligible.filter(t=>t.who==='pref-j').sort((a,b)=>b.load-a.load).forEach(t=>{
    if(jS<=wS*1.35){plan[t.id]='juliette';jS+=fw(t)}else{plan[t.id]='william';wS+=fw(t)}
  });
  eligible.filter(t=>t.who==='both').sort((a,b)=>b.load-a.load).forEach(t=>{
    if(wS<=jS){plan[t.id]='william';wS+=fw(t)}else{plan[t.id]='juliette';jS+=fw(t)}
  });
  if(!weekPlans[wk]) weekPlans[wk]={plan:{},extras:{},validated:false};
  weekPlans[wk].plan=plan;
  weekPlans[wk].validated=false;
  save();toast(`Planning généré : ${eligible.length} tâche${eligible.length>1?'s':''} dues`);renderPlanning();
}
function swapPlan(taskId,person){
  const wkd=ensureWkData();wkd.plan[taskId]=person;save();renderPlanning();
}
function removePlanTask(taskId){
  const wkd=ensureWkData();wkd.plan[taskId]='skip';save();toast('Tâche retirée cette semaine');renderPlanning();
}
function openPlanAdd(day){planAddDay=day;planAddWho='william';renderPlanning()}
function closePlanAdd(){planAddDay=null;renderPlanning()}
function pickPAW(btn,val){
  document.querySelectorAll('#pa_who .paw').forEach(b=>b.className='paw');
  btn.classList.add(val==='william'?'sw':val==='juliette'?'sj':'sb');
  planAddWho=val;
}
function confirmPlanAdd(day){
  const name=document.getElementById('pa_name')?.value.trim();
  if(!name){toast('Entrez un nom');return}
  const wkd=ensureWkData();
  if(!wkd.extras[day])wkd.extras[day]=[];
  wkd.extras[day].push({name,person:planAddWho});
  planAddDay=null;save();toast('Ajouté !');renderPlanning();
}
function removePlanExtra(day,idx){
  const wkd=ensureWkData();
  wkd.extras[day]?.splice(idx,1);
  save();toast('Supprimé');renderPlanning();
}

// ── STATS ──────────────────────────────────────────────────────────────────
function resetStats(){
  const now=new Date(),wk=weekKey();
  const before=completions.length;
  completions=completions.filter(c=>{
    const d=new Date(c.date);
    if(statPeriod==='semaine') return c.week!==wk;
    if(statPeriod==='mois') return !(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear());
    return d.getFullYear()!==now.getFullYear();
  });
  save();
  const removed=before-completions.length;
  toast(removed+' coche'+(removed>1?'s':'')+' supprimée'+(removed>1?'s':'')+(removed===0?' (déjà vide)':''));
  renderStats();
}
function renderStats(){
  const now=new Date(),wk=weekKey();
  const filtered=completions.filter(c=>{
    const d=new Date(c.date);
    if(statPeriod==='semaine')return c.week===wk;
    if(statPeriod==='mois')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return d.getFullYear()===now.getFullYear();
  });
  const wC=filtered.filter(c=>c.person==='william');
  const jC=filtered.filter(c=>c.person==='juliette');
  const wL=wC.reduce((s,c)=>s+(tasks.find(t=>t.id===c.taskId)?.load||0),0);
  const jL=jC.reduce((s,c)=>s+(tasks.find(t=>t.id===c.taskId)?.load||0),0);
  const maxL=Math.max(wL,jL,1),maxC=Math.max(wC.length,jC.length,1);
  function topT(comps){
    const cnt={};
    comps.forEach(c=>{cnt[c.taskId]=(cnt[c.taskId]||0)+1});
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,3)
      .map(([id,n])=>({name:tasks.find(t=>t.id==id)?.name||'?',n}));
  }
  const pl={semaine:'cette semaine',mois:'ce mois',annee:'cette année'}[statPeriod];
  const resetBtn=`<div style="margin-bottom:14px;background:rgba(240,112,112,0.08);border:1px solid rgba(240,112,112,0.2);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:13px;color:rgba(240,239,248,0.6)">Effacer les coches ${pl}</span>
    <button onclick="resetStats()" style="background:rgba(240,112,112,0.15);border:1px solid rgba(240,112,112,0.35);border-radius:var(--rs);color:var(--coral);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 14px;cursor:pointer;flex-shrink:0">
      🗑 Remise à zéro
    </button></div>`;
  const tabs=['semaine','mois','annee'].map(p=>`<button class="ptab${statPeriod===p?' active':''}" onclick="setStat('${p}')">${{semaine:'Semaine',mois:'Mois',annee:'Année'}[p]}</button>`).join('');
  let html=`<div class="stats-wrap"><div class="period-tabs">${tabs}</div>`;
  if(!filtered.length){
    html+=resetBtn;
    html+=`<div class="empty"><div class="empty-icon">📊</div>Aucune tâche cochée ${pl}.<br><span style="font-size:13px">Cochez vos tâches dans l'onglet Agenda !</span></div></div>`;
    document.getElementById('view-stats').innerHTML=html;return;
  }
  function pcard(name,comps,load,color,avCls){
    const top=topT(comps);
    return `<div class="pcard">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar ${avCls}" style="width:30px;height:30px;font-size:12px">${name[0]}</div>
          <span style="font-size:15px;font-weight:500">${name}</span>
        </div>
        <div style="display:flex;gap:18px">
          <div style="text-align:center"><div style="font-family:'DM Serif Display',serif;font-size:26px;line-height:1">${comps.length}</div><div style="font-size:11px;color:var(--txt2)">tâches</div></div>
          <div style="text-align:center"><div style="font-family:'DM Serif Display',serif;font-size:26px;line-height:1;color:${color}">${load}</div><div style="font-size:11px;color:var(--txt2)">pts</div></div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--txt2);margin-bottom:3px">Tâches</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(comps.length/maxC*100)}%;background:${color}"></div></div>
      <div style="font-size:11px;color:var(--txt2);margin:6px 0 3px">Niveau de galère</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(load/maxL*100)}%;background:${color};opacity:.65"></div></div>
      ${top.length?`<div style="margin-top:10px;font-size:11px;color:var(--txt2)">Top : ${top.map(t=>`<span style="background:var(--surf2);padding:2px 8px;border-radius:20px;margin-right:4px;display:inline-block;margin-top:4px">${t.name} ×${t.n}</span>`).join('')}</div>`:''}
    </div>`;
  }
  html+=pcard('William',wC,wL,'var(--acc2)','av-w');
  html+=pcard('Juliette',jC,jL,'var(--pink)','av-j');
  const totL=wL+jL;const wPct=totL?Math.round(wL/totL*100):50;
  const bal=Math.abs(wPct-50)<=12;
  html+=`<div class="pcard">
    <div style="font-size:12px;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Équilibre niveau de galère</div>
    <div style="display:flex;height:12px;border-radius:12px;overflow:hidden;margin-bottom:6px">
      <div style="width:${wPct}%;background:var(--acc);transition:width .5s"></div>
      <div style="flex:1;background:var(--pink)"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--txt2)">
      <span>William ${wPct}%</span>
      <span>${bal?'⚖️ Équilibré !':'⚠️ Déséquilibré'}</span>
      <span>${100-wPct}% Juliette</span>
    </div>
  </div>
  <div class="pcard">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:var(--surf2);border-radius:var(--rs);padding:12px;text-align:center">
        <div style="font-family:'DM Serif Display',serif;font-size:28px">${filtered.length}</div>
        <div style="font-size:11px;color:var(--txt2)">tâches totales</div>
      </div>
      <div style="background:var(--surf2);border-radius:var(--rs);padding:12px;text-align:center">
        <div style="font-family:'DM Serif Display',serif;font-size:28px">${wL+jL}</div>
        <div style="font-size:11px;color:var(--txt2)">pts de galère</div>
      </div>
    </div>
  </div></div>`;
  document.getElementById('view-stats').innerHTML=html;
}
function setStat(p){statPeriod=p;renderStats()}


function renderSettings(){

  const jColors=['#7c6af7','#5b8def','#3ecfb2','#6bcb77','#f5a623','#f07070','#e87db8','#9b59b6'];
  let html=`<div style="padding:16px 16px 0">
    <div style="background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:14px">
      <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Personne 1</div>
      <label class="fl">Nom</label>
      <input class="fi mg-b" id="set_wname" value="${settings.williamName}" placeholder="William">
      <label class="fl">Couleur</label>
      <div class="swatches">
        ${wColors.map(c=>`<div class="swatch${c===settings.williamColor?' selected':''}" style="background:${c}" onclick="pickSettingColor('w','${c}')"></div>`).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
        <div class="avatar av-w" style="width:32px;height:32px;font-size:13px">${settings.williamName[0]}</div>
        <span style="font-size:13px;color:var(--txt2)">Aperçu</span>
      </div>
    </div>

    <div style="background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:14px">
      <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Personne 2</div>
      <label class="fl">Nom</label>
      <input class="fi mg-b" id="set_jname" value="${settings.julietteName}" placeholder="Juliette">
      <label class="fl">Couleur</label>
      <div class="swatches">
        ${jColors.map(c=>`<div class="swatch${c===settings.julietteColor?' selected':''}" style="background:${c}" onclick="pickSettingColor('j','${c}')"></div>`).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
        <div class="avatar av-j" style="width:32px;height:32px;font-size:13px">${settings.julietteName[0]}</div>
        <span style="font-size:13px;color:var(--txt2)">Aperçu</span>
      </div>
    </div>

    <button onclick="saveSettings()" style="width:100%;background:var(--acc);border:none;border-radius:var(--rs);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:12px;cursor:pointer;margin-bottom:14px">
      💾 Enregistrer les réglages
    </button>

    <div style="background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;font-size:12px;color:var(--txt2);line-height:1.5">
      💡 Vos réglages sont synchronisés entre tous les appareils via Firebase.
    </div>
  </div>`;
  document.getElementById('view-settings').innerHTML=html;
}

function pickSettingColor(who,color){
  if(who==='w') settings.williamColor=color;
  else settings.julietteColor=color;
  applyColors();
  renderSettings();
}

function saveSettings(){
  const wn=document.getElementById('set_wname')?.value.trim();
  const jn=document.getElementById('set_jname')?.value.trim();
  if(wn) settings.williamName=wn;
  if(jn) settings.julietteName=jn;
  applyColors();
  save();
  toast('Réglages enregistrés !');
  render();
}


// ── INIT ───────────────────────────────────────────────────────────────────
load();
// Try to load from Firebase on first open
if(window._firebaseReady){
  window._getDoc(window._DOC).then(snap=>{
    if(snap.exists()){
      const d=snap.data();
      if(d.tasks) tasks=d.tasks;
      if(d.weekPlans) weekPlans=d.weekPlans;
      if(d.completions) completions=d.completions;
      if(d.cats) cats=d.cats;
      if(d.manualLastDone) manualLastDone=d.manualLastDone;
      if(d.settings){ settings={...settings,...d.settings}; applyColors(); }
    }
    render();
  }).catch(()=>render());
} else {
  render();
}
setInterval(render,60000);
</script>
</body>
</html>
